name: Manual Patrol Check

on:
  workflow_dispatch:
    inputs:
      target_area:
        description: '巡回エリア選択'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kanagawa
          - tama
          - force_all

jobs:
  run-scraper:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ※新しいコードは環境変数から直接鍵を読み込むため、
      # この「ファイルの作成ステップ」は不要になりますが、残しておいても害はありません。

      - name: Run Patrol Script
        env:
          # --- ここが重要：Pythonに合鍵と情報を渡す設定 ---
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TARGET_AREA: ${{ github.event.inputs.target_area }}
          PYTHONUNBUFFERED: "1"
        run: python main.py
