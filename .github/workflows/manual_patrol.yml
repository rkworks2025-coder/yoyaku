name: Manual Patrol Check

on:
  workflow_dispatch:
    inputs:
      target_area:
        description: '巡回エリア選択'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - tama
          - fuchu
          - force_all
      pw_mode:
        description: 'TMAログインPWモード'
        required: true
        default: 'mode1'
        type: choice
        options:
          - mode1
          - mode2

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scrape Stage
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TARGET_AREA: ${{ github.event.inputs.target_area }}
          PW_MODE: ${{ github.event.inputs.pw_mode }}
          STAGE: scrape
          PYTHONUNBUFFERED: "1"
        run: |
          echo "$GCP_SA_KEY" > service_account.json
          python main.py

      - name: Upload collected data
        uses: actions/upload-artifact@v4
        with:
          name: collected-data
          path: collected_data.json
          retention-days: 1

  write:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download collected data
        uses: actions/download-artifact@v4
        with:
          name: collected-data

      - name: Run Write Stage
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TARGET_AREA: ${{ github.event.inputs.target_area }}
          STAGE: write
          PYTHONUNBUFFERED: "1"
        run: |
          echo "$GCP_SA_KEY" > service_account.json
          python main.py
